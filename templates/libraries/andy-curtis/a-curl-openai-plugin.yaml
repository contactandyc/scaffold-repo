project_title: An OpenAI API Plugin for a-curl-library
version: 0.0.1

profile: andy-curtis/andy-curtis-knode
template: cmake-c-git

license_profile: andy-curtis/openai-api

depends_on:
  - andy-curtis/a-curl-library
  - andy-curtis/a-json-schema-builder-library
apps:
  context:
    dest: examples
    depends_on:
      - andy-curtis/a-curl-openai-plugin
  embeddings:
    binaries:
      - embed_test
  responses_01_basic_text:
    binaries:
      - basic_text
      - basic_text_cache_miss
      - basic_text_chain
      - basic_text_error
      - basic_text_instructions
      - basic_text_logprobs
      - basic_text_max_tokens
      - basic_text_parallel
      - basic_text_temperature_sweep
  responses_02_structured_output:
    binaries:
      - structured_single_object
      - structured_array
      - structured_nested
      - structured_chain_single_followup
      - structured_chain_parallel_followup
      - structured_validation_error
      - structured_contact_form
      - structured_calendar_event
      - structured_invoice_line_items
      - structured_moderation_report
      - structured_ui_tree
      - structured_search_query
      - structured_options_with_null
      - structured_streaming_entities
      - structured_chain_generate_then_expand
      - structured_validation_showcase
