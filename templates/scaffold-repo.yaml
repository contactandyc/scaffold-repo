version: 1.0.0
license_spdx: Apache-2.0
author: Andy Curtis
email: contactandyc@gmail.com
date: 2025-08-08

# Defaults that flow into all contexts unless overridden
cmake_min_version: "3.20"
c_standard: 23
language: C
pic: true
propagate_c_std_feature: null
simd: null
need_libm: false

# Development-only packages (installed in the container but not strictly required at runtime)
dev_packages:
  - valgrind
  - gdb
  - python3
  - python3-venv
  - python3-pip
  - perl
  - autoconf
  - automake
  - libtool

# Enabled by default (repo's scaffold-repo.yaml can override with its own `packages:`)
packages:
  - tests
  - docs
  - site
  - git

authors:
  - andy_curtis

contributors:
  andy_curtis:
    name: Andy Curtis
    email: contactandyc@gmail.com
    linkedin: linkedin.com/in/andycurtis
    github: github.com/contactandyc
    contact: "{{ name }} <{{ email }}>"
    author: "{{ name }} <{{ email }}> {{ linkedin }} {{ github }}"
  knode:
    name: Knode.ai
    website: https://www.knodeai.com/
    contact: "{{ name }}"

license_profile: andy
# github_project: knode-ai-open-source
github_project: contactandyc

licenses:
  knode-andy-maintainer:
    spdx: |  # SPDX block (no comment symbols here; tool will add them)
      SPDX-FileCopyrightText: 2024–2025 {{ contributors.knode.contact }}
      SPDX-License-Identifier: Apache-2.0
      Maintainer: {{ contributors.andy_curtis.contact }}

    # Primary license file that must exist in the target repo
    license: LICENSE
    # Canonical text to compare/copy from packaged resources
    license_canonical: resources/licenses/Apache-2.0.txt
    notice: |
      {{ project_title }} © 2024–2025 {{ contributors.knode.contact }}
      Technical contact: {{ contributors.andy_curtis.contact }}
      Licensed under Apache-2.0 (see LICENSE)

  knode-shared-19:
    spdx: |
      SPDX-FileCopyrightText: 2019–{{ year }} {{ contributors.andy_curtis.contact }}
      SPDX-FileCopyrightText: 2024–2025 {{ contributors.knode.contact }} — technical questions: contact Andy (above)
      SPDX-License-Identifier: Apache-2.0

    license: LICENSE
    license_canonical: resources/licenses/Apache-2.0.txt
    notice: |
      {{ project_title }}
      © 2019–2025 {{ contributors.andy_curtis.contact }}
      © 2024–2025 {{ contributors.knode.contact }}
      Licensed under Apache-2.0 (see LICENSE)

  dutch-national-flag:
    spdx: |
      Based on the Dutch national flag problem (https://en.wikipedia.org/wiki/Dutch_national_flag_problem)
      Consulted: Bentley & McIlroy, “Engineering a sort function,”
      Software – Practice and Experience 23(11): 1249–1265 (1993)

    notice: |
      Based on the Dutch national flag problem (https://en.wikipedia.org/wiki/Dutch_national_flag_problem)
      Consulted: Bentley & McIlroy, “Engineering a sort function,”
      Software – Practice and Experience 23(11): 1249–1265 (1993)

  knode-shared-23:
    spdx: |
      SPDX-FileCopyrightText: 2023–{{ year }} {{ contributors.andy_curtis.contact }}
      SPDX-FileCopyrightText: 2024–2025 {{ contributors.knode.contact }} — technical questions: contact Andy (above)
      SPDX-License-Identifier: Apache-2.0

    license: LICENSE
    license_canonical: resources/licenses/Apache-2.0.txt
    notice: |
      {{ project_title }}
      © 2023–2025 {{ contributors.andy_curtis.contact }}
      © 2024–2025 {{ contributors.knode.contact }}
      Licensed under Apache-2.0 (see LICENSE)

  knode-shared:
    spdx: |
      SPDX-FileCopyrightText: {{ year }} {{ contributors.andy_curtis.contact }}
      SPDX-FileCopyrightText: 2024–2025 {{ contributors.knode.contact }} — technical questions: contact Andy (above)
      SPDX-License-Identifier: Apache-2.0

    license: LICENSE
    license_canonical: resources/licenses/Apache-2.0.txt
    notice: |
      {{ project_title }}
      © 2025 {{ contributors.andy_curtis.contact }}
      © 2024–2025 {{ contributors.knode.contact }}
      Licensed under Apache-2.0 (see LICENSE)

  andy:
    spdx: |
      SPDX-FileCopyrightText: 2025 {{ contributors.andy_curtis.contact }}
      SPDX-License-Identifier: Apache-2.0

    license: LICENSE
    license_canonical: resources/licenses/Apache-2.0.txt
    notice: |
      {{ project_title }} © 2025 {{ contributors.andy_curtis.contact }}
      Licensed under Apache-2.0 (see LICENSE)

  gcloud-api:
    spdx: |
      SPDX-FileCopyrightText: 2025 {{ contributors.andy_curtis.contact }}
      SPDX-License-Identifier: Apache-2.0

      SPDX-FileComment: This project is an independent library for interacting with the Google and Google Cloud API.
      It is not affiliated with, endorsed by, or sponsored by Google.
      "Google" and related marks are trademarks of Alphabet.
